name: Build with SonarCloud

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para análise completa

      # Configurar JDK (Sonar precisa de Java)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Configurar .NET
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x' # ou a versão do seu projeto

      # Restaurar pacotes
      - name: Restore
        run: dotnet restore ./MyMusicLibrary.sln

      # Build
      - name: Build
        run: dotnet build ./MyMusicLibrary.sln --no-restore

      # Testes
      - name: Test
        run: dotnet test ./tests/*.csproj --no-build --verbosity normal

      # Análise SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=foqsz-1
            -Dsonar.organization=Foqsz_MyMusicLibrary
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
