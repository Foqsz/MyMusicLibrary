name: SonarCloud

on:
  push:
    branches:
      - develop

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v3
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Start SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"Foqsz_MyMusicLibrary" `
            /o:"foqsz-1" `
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.cs.opencover.reportsPaths="coverage.opencover.xml"

      - name: Build solution
        run: dotnet build MyMusicLibrary.sln --configuration Release

      - name: Run tests with coverage (single report)
        run: dotnet test MyMusicLibrary.sln --configuration Release `
          /p:CollectCoverage=true `
          /p:CoverletOutput=./coverage.opencover.xml `
          /p:CoverletOutputFormat=opencover `
          -l trx

      - name: Debug - list coverage files
        shell: powershell
        run: |
          Write-Host "Listing all coverage reports:"
          Get-ChildItem -Path . -Filter "coverage.opencover.xml" -Recurse -File | ForEach-Object { $_.FullName }

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner end `
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
