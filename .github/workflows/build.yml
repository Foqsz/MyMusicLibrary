name: SonarCloud
on:
  push:
    branches:
      - develop

jobs:
  build:
    name: Build, Test and Analyze
    runs-on: windows-latest

    steps:
      # 1. Checkout do código
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Configurar JDK (necessário para SonarScanner)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'zulu'

      # 3. Cache do SonarCloud packages
      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 4. Cache do SonarScanner
      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v3
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      # 5. Instalar SonarScanner se cache não existir
      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      # 6. Iniciar análise SonarCloud
      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"Foqsz_MyMusicLibrary" `
            /o:"foqsz-1" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.cs.opencover.reportsPaths="tests\**\coverage.opencover.xml"

      # 7. Build do projeto
      - name: Build
        run: dotnet build

      # 8. Testar e gerar cobertura
      - name: Test and collect coverage
        run: |
          dotnet test ./tests/UseCases.test/UseCases.Test.csproj `
            --collect:"XPlat Code Coverage" `
            --results-directory:tests/UseCases `
            /p:CoverletOutput=tests/UseCases/coverage.opencover.xml `
            /p:CoverletOutputFormat=opencover

          dotnet test ./tests/Validators.test/Validators.Test.csproj `
            --collect:"XPlat Code Coverage" `
            --results-directory:tests/Validators `
            /p:CoverletOutput=tests/Validators/coverage.opencover.xml `
            /p:CoverletOutputFormat=opencover

          dotnet test ./tests/WebApi.Test/WebApi.Test.csproj `
            --collect:"XPlat Code Coverage" `
            --results-directory:tests/WebApi `
            /p:CoverletOutput=tests/WebApi/coverage.opencover.xml `
            /p:CoverletOutputFormat=opencover

      # 9. Finalizar análise SonarCloud
      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
