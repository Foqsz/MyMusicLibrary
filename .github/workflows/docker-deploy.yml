name: Build and Deploy Docker to Azure App Service

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

env:
  REGISTRY: myacr.azurecr.io          # Azure Container Registry
  IMAGE_NAME: mymusiclibrary         # Nome da imagem
  APP_NAME: MyMusicLibraryAppService # Nome do App Service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Login no Azure para autenticar TUDO
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3️⃣ Login no Azure Container Registry (ACR)
      #    Este passo agora usa a autenticação do passo anterior
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}

      # 4️⃣ Build e push da imagem Docker
      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 5️⃣ Deploy no App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'
